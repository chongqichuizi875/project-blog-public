name: Deploy Astro site to Pages

on:
  # 推送到默认分支时自动构建部署
  push:
    branches: [main]
  # 允许在 Actions 页手动触发
  workflow_dispatch:

# 授予 GITHUB_TOKEN 部署 Pages 所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新推送不取消进行中的发布
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
